<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>3D Map + Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

<link rel="stylesheet" href="style2.css"/> <!-- deleted -> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>-->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Font Links -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Jersey+10&display=swap" rel="stylesheet">

<style>

</head>

<body>
  <!--<div id="coordinate-results"></div>-->
  <div id="map"></div>

<!-- Loads after divs are loaded. order is important
   <div class="topnav">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Projects</a>
</div>-->



<!-- Script here so that I can refer to the assets using a direct path. if in js file, error occurs-->
<script>

// Create navbar div
const navDiv = document.createElement("div");
navDiv.id = "topnav";
navDiv.style.position = "absolute";  // position it on top
navDiv.style.top = "0";              // top of the page/container
navDiv.style.left = "0";             // align left
navDiv.style.width = "100%";
navDiv.style.height="auto";         // full width
navDiv.style.zIndex = "1000";        // make sure it's above the map

// Create image
const navImg = document.createElement("img");
navImg.src = "assets/mpassets/taskbara.png";  // make sure path is correct
navImg.alt = "Navbar background";
navImg.style.width = "100%";
navImg.style.height = "auto";
navImg.style.display = "block";

// Add image to div
navDiv.appendChild(navImg);

// Add navbar to the body (on top of map)
document.body.appendChild(navDiv); // comment out to hide search bar 

// nav buttons  
// About 
const about = document.createElement("button");
about.id="about-btn";
navDiv.appendChild(about);
// Set the size and position
about.style.width = "10%";
about.style.height = "auto";
about.style.padding = "0";  
about.style.top = "20%";      // near bottom of the parent/div
about.style.left = "49%";     // position from left
about.style.border = "none";  // remove default border
about.style.background = "none"; // remove default button background
about.style.cursor = "pointer";  // pointer on hover
about.style.position = "absolute"; // overlay

// Add the image inside the gmap button
const aboutImg = document.createElement("img");
aboutImg.src = "assets/mpassets/about.png"; // your image path
aboutImg.style.width = "100%";   // fills the button width
aboutImg.style.height = "auto";  // fills the button height
aboutImg.style.display = "block"; // removes inline spacing
about.appendChild(aboutImg);

// Hover photo
about.addEventListener("mouseenter", () => {
  aboutImg.src = "assets/mpassets/hoverabout.png"; // image to show on hover
});
about.addEventListener("mouseleave", () => {  
  aboutImg.src = "assets/mpassets/about.png"; // revert back
});


// Gallery 
const gallery = document.createElement("button");
gallery.id = "gallery-btn";
navDiv.appendChild(gallery);

// Set the size and position
gallery.style.width = "10%";
gallery.style.height = "auto";
gallery.style.padding = "0";  
gallery.style.top = "20%";      // near bottom of the parent/div
gallery.style.left = "40%";     // position from left
gallery.style.border = "none";  // remove default border
gallery.style.background = "none"; // remove default button background
gallery.style.cursor = "pointer";  // pointer on hover
gallery.style.position = "absolute"; // overlay

// Add the image inside the gallery button
const galleryImg = document.createElement("img");
galleryImg.src = "assets/mpassets/gallery.png"; // updated image path
galleryImg.style.width = "100%";   // fills the button width
galleryImg.style.height = "auto";  // fills the button height
galleryImg.style.display = "block"; // removes inline spacing

gallery.appendChild(galleryImg);


// Hover photo
gallery.addEventListener("mouseenter", () => {
  galleryImg.src = "assets/mpassets/hovergallery.png"; // image to show on hover
});
gallery.addEventListener("mouseleave", () => {  
  galleryImg.src = "assets/mpassets/gallery.png"; // revert back
});

// Search 

// Create search button
const search = document.createElement("button");
search.id = "searchToggle";
navDiv.appendChild(search);

// Set the size and position
search.style.width = "2.8%";
search.style.height = "auto";
search.style.padding = "0";  
search.style.top = "20%";      // near bottom of the parent/div
search.style.left = "90%";     // position from left
search.style.border = "none";  // remove default border
search.style.background = "none"; // remove default button background
search.style.cursor = "pointer";  // pointer on hover
search.style.position = "absolute"; // overlay

// Add the image inside the search button
const searchImg = document.createElement("img");
searchImg.src = "assets/mpassets/search.png"; // your search icon image path
searchImg.style.width = "100%";   // fills the button width
searchImg.style.height = "auto";  // fills the button height
searchImg.style.display = "block"; // removes inline spacing

search.appendChild(searchImg);

// Hover photo
search.addEventListener("mouseenter", () => {
  searchImg.src = "assets/mpassets/hoversearch.png"; // image to show on hover
});
search.addEventListener("mouseleave", () => {  
  searchImg.src = "assets/mpassets/search.png"; // revert back
});


// Create results div 
const coorsDiv = document.createElement("div");
coorsDiv.id = "coordinate-results"; 
document.body.appendChild(coorsDiv);

// styling 
coorsDiv.style.zIndex = "100";        // make sure it's above the map
coorsDiv.style.position = "fixed";  // stays on screen even on scroll
coorsDiv.style.top = "50%";
coorsDiv.style.left = "50%";
coorsDiv.style.transform = "translate(-50%, -50%)"; // center exactly
coorsDiv.style.width = "25vw";
coorsDiv.style.fontSize = "1vw"; // scales with viewport width


// Create image for results div 
const coorsImg = document.createElement("img");
coorsImg.src = "assets/mpassets/buildingdeet.png";  // make sure path is correct
coorsImg.setAttribute("data-pin-nopin", "true"); // remove the freaken pinterest icon 
coorsImg.alt = "Coordinate results background";
coorsImg.style.width = "100%";
coorsImg.style.height = "auto";
coorsImg.style.display = "block";
coorsImg.style.position = "relative";
coorsImg.style.borderRadius = "8px";
coorsDiv.appendChild(coorsImg); 


// close button
const close = document.createElement("button");
close.id = "close-btn";
coorsDiv.appendChild(close);

// set the size
close.style.width = "6%";
close.style.height = "7%";
close.style.padding = "0";  
close.style.top = "2%";             // top-left corner
close.style.left = "2%";
close.style.border = "none"; // remove default border
close.style.background = "none"; // remove default button background
close.style.cursor = "pointer";  // pointer on hover
close.style.position = "absolute";       // overlay

// Add the image inside the button
const closeImg = document.createElement("img");
closeImg.src = "assets/mpassets/close.png"; // your image path
closeImg.style.width = "100%";  // fills the button width
closeImg.style.height = "auto"; // fills the button height
closeImg.style.display = "block"; // removes inline spacing

close.appendChild(closeImg);


// gmap button
const gmap = document.createElement("button");
gmap.id = "gmap-btn";
coorsDiv.appendChild(gmap);

// Set the size and position
gmap.style.width = "30%";
gmap.style.height = "auto";
gmap.style.padding = "0";  
gmap.style.top = "90%";             // top-left corner
gmap.style.left = "65%";
gmap.style.border = "none";        // remove default border
gmap.style.background = "none";    // remove default button background
gmap.style.cursor = "pointer";     // pointer on hover
gmap.style.position = "absolute";  // overlay

// Add the image inside the gmap button
const gmapImg = document.createElement("img");
gmapImg.src = "assets/mpassets/googlemaps.png"; // your image path
gmapImg.style.width = "100%";   // fills the button width
gmapImg.style.height = "auto";  // fills the button height
gmapImg.style.display = "block"; // removes inline spacing

gmap.appendChild(gmapImg);

// Hover photo
gmap.addEventListener("mouseenter", () => {
  gmapImg.src = "assets/mpassets/hovergooglemaps.png"; // image to show on hover
});
gmap.addEventListener("mouseleave", () => {  
  gmapImg.src = "assets/mpassets/googlemaps.png"; // revert back
});




</script> 

<script src="js/locate.js" defer></script>


</body>
</html>
